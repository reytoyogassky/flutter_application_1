name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
    paths:
      - 'lib/**'
      - 'android/**'
      - 'pubspec.yaml'

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      
      - name: Flutter Doctor
        run: flutter doctor -v
      
      - name: Get Dependencies
        run: flutter pub get
      
      - name: Analyze Code
        run: flutter analyze
        continue-on-error: true
      
      - name: Build APK (Release)
        run: flutter build apk --release
      
      - name: Rename APK
        run: |
          cd build/app/outputs/flutter-apk
          mv app-release.apk wifisekre-voucher-generator-v1.0.0.apk
      
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: wifisekre-voucher-generator-apk
          path: build/app/outputs/flutter-apk/wifisekre-voucher-generator-v1.0.0.apk
          retention-days: 30
      
      - name: Upload to Release (if tagged)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: build/app/outputs/flutter-apk/wifisekre-voucher-generator-v1.0.0.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
